async function startDB(){try{firebase.initializeApp(firebaseConfig);db=firebase.firestore();await db.enablePersistence({synchronizeTabs:true}).catch(()=>{});await db.collection(COLLECTION).limit(1).get();cloud=true;setConnection(true)}catch(e){cloud=false;setConnection(false)}}
function localRows(){try{return JSON.parse(localStorage.getItem(LOCAL)||'[]')}catch{return[]}}
function saveLocal(rows){localStorage.setItem(LOCAL,JSON.stringify(rows));window.dispatchEvent(new Event('quarantine-updated'))}
async function addRecord(row){if(cloud){await db.collection(COLLECTION).doc(row.id).set(row)}else{const a=localRows();a.unshift(row);saveLocal(a)}}
async function updateRecord(id,changes){if(cloud){await db.collection(COLLECTION).doc(id).update(changes)}else{saveLocal(localRows().map(x=>x.id===id?{...x,...changes}:x))}}
async function getRecords(){if(cloud){const s=await db.collection(COLLECTION).orderBy('creadoEn','desc').get();return s.docs.map(d=>d.data())}return localRows()}function watchRecords(handler){if(cloud){return db.collection(COLLECTION).orderBy('creadoEn','desc').onSnapshot(s=>{setConnection(true);handler(s.docs.map(d=>d.data()))},()=>setConnection(false))}const refresh=()=>handler(localRows());refresh();window.addEventListener('storage',refresh);window.addEventListener('quarantine-updated',refresh);return()=>{window.removeEventListener('storage',refresh);window.removeEventListener('quarantine-updated',refresh)}}

async function sha256(value){const bytes=new TextEncoder().encode(value),hash=await crypto.subtle.digest('SHA-256',bytes);return [...new Uint8Array(hash)].map(b=>b.toString(16).padStart(2,'0')).join('')}

releaseForm.addEventListener('submit',async e=>{e.preventDefault();const x=activeRecords.find(v=>v.id===releaseRecord.value),qty=Number(releaseQty.value),available=remaining(x);if(!x||qty<1||qty>available){alert('La cantidad debe estar entre 1 y '+available+'.');return}const totalReleased=Number(x.cantidadLiberada||0)+qty,newState=totalReleased>=Number(x.cantidad)?'LIBERADO':'LIBERADO PARCIAL';const event={estatus:newState,fecha:new Date().toISOString(),cantidadLiberada:qty,motivo:releaseReason.value.trim(),autoriza:releaseAuthorizer.value.trim(),responsable:releaseResponsible.value.trim()};await updateRecord(x.id,{estatus:newState,cantidadLiberada:totalReleased,cantidadRestante:Number(x.cantidad)-totalReleased,motivoLiberacion:event.motivo,autorizaSalida:event.autoriza,responsableSalida:event.responsable,actualizadoEn:event.fecha,historial:[...(x.historial||[]),event]});releaseForm.reset();releaseSummary.classList.add('hidden');await loadActive();msg.textContent='Liberación registrada correctamente. Estatus actual: '+newState+'.';msg.classList.remove('hidden');scrollTo({top:0,behavior:'smooth'})});startDB().then(()=>watchRecords(all=>loadActive(all)));</script></body></html>
